name: Deploy Mahila Mandal

on:
  push:
    branches:
      - main
      - testing

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Live
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/mahila-mandal-live
            git pull origin main
            npm install
            npm run build
            cd backend
            npm install
            pm2 restart mahila-live

      - name: Deploy to Testing
        if: github.ref == 'refs/heads/testing'
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/mahila-mandal-testing
            git pull origin testing
            npm install
            npm run build
            cd backend
            npm install
            pm2 restart mahila-testing